<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="dark">
<title>13F Ledger — 버크셔 해서웨이 포트폴리오 변화 추적</title>
<meta name="description" content="워런 버핏 버크셔 해서웨이의 분기별 13F 포트폴리오 변화를 신규·청산·증액·축소 중심으로 추적합니다.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans+JP:wght@400;500;600;700&family=IBM+Plex+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<!-- ECharts (treemap). Served from Cloudflare CDN; swap to a self-hosted copy if you prefer zero third-party requests. -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/echarts/5.5.0/echarts.min.js"></script>
<style>
  :root{
    color-scheme:dark;
    --paper:#0D141C; --panel:#121C27; --panel-2:#0F1822; --line:#22303F;
    --ink:#EDF2F7; --muted:#A7BACC; --faint:#6B7E90;
    --up:#F0524C; --down:#3E7BEA; --stamp:#C8A96C; --stamp-dim:#8a744a;
    --neutral:#33465A;
    --mono:'IBM Plex Mono',ui-monospace,SFMono-Regular,Menlo,monospace;
    --sans:'IBM Plex Sans KR','IBM Plex Sans JP',system-ui,-apple-system,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  html{background-color:var(--paper)}
  body{
    background-color:var(--paper) !important; color:var(--ink); font-family:var(--sans);
    font-weight:400; line-height:1.5; -webkit-font-smoothing:antialiased; min-height:100vh;
  }
  .wrap{
    max-width:1080px; margin:0 auto; padding:28px 20px 80px;
    background-color:var(--paper); min-height:100vh;
    background-image:radial-gradient(circle at 15% -10%, rgba(200,169,108,.06), transparent 42%),
                     radial-gradient(circle at 110% 8%, rgba(62,123,234,.06), transparent 46%);
  }
  .mono{font-family:var(--mono); font-variant-numeric:tabular-nums}
  a{color:var(--stamp); text-decoration:none; border-bottom:1px solid transparent}
  a:hover{border-bottom-color:var(--stamp)}
  a:focus-visible,button:focus-visible,select:focus-visible{outline:2px solid var(--stamp); outline-offset:2px}

  /* ---- top bar ---- */
  .topbar{display:flex; justify-content:space-between; align-items:flex-start; gap:16px; flex-wrap:wrap; margin-bottom:22px}
  .brand{display:flex; flex-direction:column; gap:2px}
  .brand .kicker{font-family:var(--mono); font-size:11px; letter-spacing:.28em; color:var(--stamp); text-transform:uppercase}
  .brand h1{margin:0; font-size:23px; font-weight:600; letter-spacing:-.01em}
  .brand .sub{color:var(--muted); font-size:13px}
  .controls{display:flex; gap:8px; align-items:center; flex-wrap:wrap}
  .seg{display:inline-flex; border:1px solid var(--line); border-radius:7px; overflow:hidden}
  .seg button{background:transparent; color:var(--muted); border:0; padding:7px 12px; font-family:var(--mono); font-size:12px; letter-spacing:.05em; cursor:pointer}
  .seg button[aria-pressed="true"]{background:var(--panel); color:var(--ink)}
  select.qsel{background:var(--panel); color:var(--ink); border:1px solid var(--line); border-radius:7px; padding:7px 10px; font-family:var(--mono); font-size:12px; cursor:pointer}

  /* ---- signature: the SEC filing stamp ---- */
  .stamp-row{display:grid; grid-template-columns:1.15fr .85fr; gap:18px; margin-bottom:22px}
  @media (max-width:760px){ .stamp-row{grid-template-columns:1fr} }
  .headline{
    background:var(--panel); border:1px solid var(--line); border-radius:12px;
    padding:22px 24px; display:flex; flex-direction:column; justify-content:center;
  }
  .headline .lead{font-family:var(--mono); font-size:11px; letter-spacing:.24em; color:var(--muted); text-transform:uppercase; margin-bottom:10px}
  .headline .big{font-size:26px; font-weight:600; line-height:1.28; letter-spacing:-.01em}
  .headline .big b{color:var(--stamp); font-weight:600}
  .headline .big .u{color:var(--up)} .headline .big .d{color:var(--down)}

  .stamp{
    position:relative; border:2px solid var(--stamp-dim); border-radius:6px;
    background:
      repeating-linear-gradient(135deg, rgba(200,169,108,.035) 0 6px, transparent 6px 12px),
      var(--panel-2);
    padding:18px 20px; color:var(--stamp);
  }
  .stamp:before,.stamp:after{content:""; position:absolute; width:12px; height:12px; border:2px solid var(--stamp-dim)}
  .stamp:before{top:6px; left:6px; border-right:0; border-bottom:0}
  .stamp:after{bottom:6px; right:6px; border-left:0; border-top:0}
  .stamp .st-top{display:flex; align-items:center; gap:8px; font-family:var(--mono); font-size:10px; letter-spacing:.2em; border-bottom:1px dashed var(--stamp-dim); padding-bottom:8px; margin-bottom:10px}
  .stamp .st-top .dot{width:9px; height:9px; border-radius:50%; border:2px solid var(--stamp); display:inline-block}
  .stamp dl{display:grid; grid-template-columns:auto 1fr; gap:4px 14px; margin:0; font-family:var(--mono)}
  .stamp dt{font-size:10px; letter-spacing:.14em; color:var(--stamp-dim); text-transform:uppercase; align-self:center}
  .stamp dd{margin:0; font-size:14px; font-weight:500; color:var(--stamp); text-align:right}
  .stamp .st-foot{margin-top:10px; padding-top:8px; border-top:1px dashed var(--stamp-dim); font-family:var(--mono); font-size:10px; letter-spacing:.1em; color:var(--stamp-dim); display:flex; justify-content:space-between}

  /* ---- stat tiles ---- */
  .tiles{display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-bottom:20px}
  @media (max-width:760px){ .tiles{grid-template-columns:repeat(2,1fr)} }
  .tile{background:var(--panel); border:1px solid var(--line); border-radius:10px; padding:14px 16px}
  .tile .t-label{font-size:11px; color:var(--muted); letter-spacing:.04em; margin-bottom:8px; min-height:15px}
  .tile .t-value{font-family:var(--mono); font-size:22px; font-weight:600; letter-spacing:-.02em}
  .tile .t-sub{font-family:var(--mono); font-size:12px; margin-top:4px; color:var(--faint)}
  .t-sub.up{color:var(--up)} .t-sub.down{color:var(--down)}

  /* ---- summary ---- */
  .summary{background:linear-gradient(180deg, var(--panel), var(--panel-2)); border:1px solid var(--line); border-left:3px solid var(--stamp); border-radius:10px; padding:16px 20px; margin-bottom:22px; font-size:15px; line-height:1.7}
  .summary .s-tag{font-family:var(--mono); font-size:10px; letter-spacing:.2em; color:var(--stamp); text-transform:uppercase; display:block; margin-bottom:6px}

  /* ---- section headers ---- */
  .sec-h{display:flex; align-items:baseline; gap:12px; margin:30px 0 14px}
  .sec-h h2{margin:0; font-size:15px; font-weight:600; letter-spacing:.02em}
  .sec-h .n{font-family:var(--mono); font-size:11px; color:var(--stamp); letter-spacing:.15em}
  .sec-h .rule{flex:1; height:1px; background:var(--line)}
  .legend{display:flex; gap:16px; font-family:var(--mono); font-size:11px; color:var(--muted); align-items:center}
  .legend i{width:22px; height:9px; border-radius:2px; display:inline-block; margin-right:6px; vertical-align:middle}

  /* ---- treemap ---- */
  #treemap{width:100%; height:440px; background:var(--panel); border:1px solid var(--line); border-radius:12px}
  @media (max-width:760px){ #treemap{height:380px} }

  /* ---- change ledger ---- */
  .ledger{display:grid; grid-template-columns:1fr 1fr; gap:14px}
  @media (max-width:760px){ .ledger{grid-template-columns:1fr} }
  .lgroup{background:var(--panel); border:1px solid var(--line); border-radius:10px; padding:14px 16px}
  .lgroup h3{margin:0 0 12px; font-size:12px; letter-spacing:.06em; display:flex; align-items:center; gap:8px}
  .lgroup h3 .badge{font-family:var(--mono); font-size:10px; padding:2px 7px; border-radius:20px; border:1px solid currentColor}
  .g-new{color:var(--stamp)} .g-exit{color:var(--muted)} .g-add{color:var(--up)} .g-trim{color:var(--down)}
  .lrow{display:grid; grid-template-columns:64px 1fr auto; gap:10px; align-items:center; padding:6px 0; border-top:1px dashed var(--line)}
  .lrow:first-of-type{border-top:0}
  .lrow .tkr{font-family:var(--mono); font-size:13px; font-weight:600; color:var(--ink)}
  .lrow .bar-wrap{height:8px; background:var(--panel-2); border-radius:4px; overflow:hidden}
  .lrow .bar{height:100%; border-radius:4px}
  .bar.up{background:var(--up)} .bar.down{background:var(--down)} .bar.new{background:var(--stamp)} .bar.exit{background:var(--faint)}
  .lrow .amt{font-family:var(--mono); font-size:12px; text-align:right; white-space:nowrap}
  .amt.up{color:var(--up)} .amt.down{color:var(--down)} .amt.new{color:var(--stamp)} .amt.exit{color:var(--muted)}
  .empty{color:var(--faint); font-size:13px; font-family:var(--mono); padding:6px 0}

  /* ---- table ---- */
  .tbl-scroll{overflow-x:auto; border:1px solid var(--line); border-radius:12px; background:var(--panel)}
  table{width:100%; border-collapse:collapse; min-width:640px; background:var(--panel)}
  thead th{position:sticky; top:0; background:var(--panel-2); text-align:right; font-family:var(--mono); font-size:11px; font-weight:500; letter-spacing:.06em; color:var(--muted); padding:11px 14px; border-bottom:1px solid var(--line); text-transform:uppercase}
  thead th.l{text-align:left}
  tbody td{padding:10px 14px; border-bottom:1px solid var(--line); font-size:13px; text-align:right; color:var(--ink)}
  tbody tr:last-child td{border-bottom:0}
  tbody tr:hover{background:rgba(255,255,255,.02)}
  td.l{text-align:left}
  td.num{font-family:var(--mono); font-variant-numeric:tabular-nums; white-space:nowrap}
  .tkr-cell{font-family:var(--mono); font-weight:600; color:var(--ink)}
  .tkr-cell .cl{color:var(--faint); font-weight:400; font-size:11px; margin-left:4px}
  .co{color:#B4C4D4; font-size:12px}
  .pill{font-family:var(--mono); font-size:10px; padding:2px 8px; border-radius:20px; letter-spacing:.05em; display:inline-block}
  .pill.NEW{color:var(--stamp); border:1px solid var(--stamp-dim)}
  .pill.ADD{color:var(--up); border:1px solid rgba(240,82,76,.4)}
  .pill.TRIM{color:var(--down); border:1px solid rgba(62,123,234,.4)}
  .pill.KEEP{color:var(--faint); border:1px solid var(--line)}
  .pill.HOLD{color:var(--muted); border:1px solid var(--line)}
  .chg.up{color:var(--up)} .chg.down{color:var(--down)} .chg.flat{color:var(--faint)}

  /* ---- beyond 13F (off-13F assets) ---- */
  .beyond-note{background:rgba(240,82,76,.06); border:1px solid rgba(240,82,76,.28); border-radius:10px; padding:12px 16px; margin-bottom:14px; font-size:13px; color:#E0BEBB; line-height:1.6}
  .beyond-grid{display:grid; grid-template-columns:1fr 1fr; gap:14px}
  @media (max-width:760px){ .beyond-grid{grid-template-columns:1fr} }
  .beyond-card{background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:16px 18px}
  .bc-head{display:flex; justify-content:space-between; align-items:baseline; gap:8px; margin-bottom:12px}
  .bc-head h3{margin:0; font-size:14px; font-weight:600; color:var(--ink)}
  .bc-asof{font-family:var(--mono); font-size:11px; color:var(--faint); white-space:nowrap}
  .jp-row{display:grid; grid-template-columns:52px 1fr auto; gap:10px; align-items:center; padding:7px 0; border-top:1px dashed var(--line)}
  .jp-row:first-child{border-top:0}
  .jp-code{font-family:var(--mono); font-size:12px; color:var(--stamp)}
  .jp-name{font-size:13px; color:var(--ink)}
  .jp-stake{font-family:var(--mono); font-size:12px; color:var(--up); font-weight:600}
  .jp-agg{display:flex; align-items:center; gap:12px; margin-top:12px; padding-top:12px; border-top:1px solid var(--line)}
  .jp-agg .ag-l{display:block; font-size:10px; color:var(--muted); font-family:var(--mono); letter-spacing:.04em}
  .jp-agg .ag-v{display:block; font-family:var(--mono); font-size:15px; font-weight:600; margin-top:2px; color:var(--ink)}
  .jp-agg .ag-v.up{color:var(--up)}
  .ag-arrow{color:var(--faint)}
  .ag-gain{margin-left:auto; font-family:var(--mono); font-size:13px; font-weight:600}
  .ag-gain.up{color:var(--up)}
  .bs-tiles{display:grid; grid-template-columns:1fr 1fr; gap:10px}
  .bs-tile{background:var(--panel-2); border:1px solid var(--line); border-radius:8px; padding:10px 12px}
  .bt-l{font-size:11px; color:var(--muted); margin-bottom:5px; min-height:14px}
  .bt-v{font-family:var(--mono); font-size:16px; font-weight:600; color:var(--ink)}
  .bt-sub{font-family:var(--mono); font-size:11px; margin-top:3px; color:var(--faint)}
  .bt-sub.up{color:var(--up)} .bt-sub.down{color:var(--down)}
  .bs-insight{margin-top:12px; font-size:13px; color:var(--ink); line-height:1.6}
  .bs-insight b{color:var(--stamp)}
  .bc-src{margin-top:12px; font-family:var(--mono); font-size:10px; color:var(--faint); line-height:1.5}
  .bc-note{margin-top:6px; font-size:11px; color:var(--muted); line-height:1.5}

  /* ---- ad slot ---- */
  .adslot{margin:34px 0 10px; min-height:90px; border:1px dashed var(--line); border-radius:10px; display:flex; align-items:center; justify-content:center; color:var(--faint); font-family:var(--mono); font-size:11px; letter-spacing:.1em}

  /* ---- footer ---- */
  footer{margin-top:34px; padding-top:20px; border-top:1px solid var(--line); color:var(--muted); font-size:12px; line-height:1.7}
  footer .disc{background:var(--panel-2); border:1px solid var(--line); border-radius:8px; padding:12px 16px; margin-bottom:14px}
  footer .meta-line{display:flex; gap:16px; flex-wrap:wrap; font-family:var(--mono); font-size:11px; color:var(--faint)}

  @media (prefers-reduced-motion: reduce){ *{animation:none !important; transition:none !important} }
</style>
</head>
<body>
<div class="wrap">

  <div class="topbar">
    <div class="brand">
      <span class="kicker">13F LEDGER</span>
      <h1 id="mgr-name">—</h1>
      <span class="sub" id="mgr-sub">SEC Form 13F-HR · 분기별 보유 변화 추적</span>
    </div>
    <div class="controls">
      <div class="seg" role="group" aria-label="language">
        <button id="lang-ko" aria-pressed="true">KO</button>
        <button id="lang-ja" aria-pressed="false">JP</button>
        <button id="lang-en" aria-pressed="false">EN</button>
      </div>
      <select class="qsel mono" id="qsel" aria-label="quarter"></select>
    </div>
  </div>

  <div class="stamp-row">
    <div class="headline">
      <span class="lead" id="hl-lead">THIS QUARTER</span>
      <div class="big" id="hl-big">—</div>
    </div>
    <div class="stamp" aria-label="SEC filing stamp">
      <div class="st-top"><span class="dot"></span><span>SEC · EDGAR · OFFICIAL FILING</span></div>
      <dl>
        <dt id="k-form">Form</dt><dd id="v-form">13F-HR</dd>
        <dt id="k-period">Period</dt><dd id="v-period">—</dd>
        <dt id="k-filed">Filed</dt><dd id="v-filed">—</dd>
        <dt id="k-cik">CIK</dt><dd id="v-cik">—</dd>
      </dl>
      <div class="st-foot"><span id="v-acc">—</span><a id="v-link" href="#" target="_blank" rel="noopener">EDGAR ↗</a></div>
    </div>
  </div>

  <div class="tiles" id="tiles"></div>

  <div class="summary">
    <span class="s-tag" id="sum-tag">AUTO SUMMARY · 자동 생성</span>
    <span id="sum-text">—</span>
  </div>

  <div class="sec-h">
    <span class="n">01</span><h2 id="h-map">보유 구성 &amp; 분기 변화</h2><span class="rule"></span>
    <span class="legend" id="legend"></span>
  </div>
  <div id="treemap" role="img" aria-label="portfolio treemap"></div>

  <div class="sec-h"><span class="n">02</span><h2 id="h-ledger">변화 렛저</h2><span class="rule"></span></div>
  <div class="ledger" id="ledger"></div>

  <div class="sec-h"><span class="n">03</span><h2 id="h-table">전체 보유 내역</h2><span class="rule"></span></div>
  <div class="tbl-scroll">
    <table>
      <thead><tr id="thead-row"></tr></thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>

  <div class="sec-h"><span class="n">04</span><h2 id="h-beyond">13F 밖의 자산</h2><span class="rule"></span></div>
  <div class="beyond-note" id="beyond-note"></div>
  <div class="beyond-grid">
    <div class="beyond-card" id="jp-card"></div>
    <div class="beyond-card" id="bs-card"></div>
  </div>

  <!-- AD SLOT: paste your AdSense <ins> unit here. Keep it below the fold and clearly separated from data. -->
  <div class="adslot" id="adslot">AD SLOT · 광고 영역</div>

  <footer>
    <div class="disc" id="disclaimer">—</div>
    <div class="meta-line">
      <span id="src-line">SOURCE —</span>
      <span id="gen-line">GENERATED —</span>
      <span><a href="privacy.html">개인정보처리방침 · プライバシーポリシー</a></span>
    </div>
  </footer>

</div>

<script src="data/data.js"></script>

  // ---------- helpers ----------
  function t(){ return STR[lang]; }
  function eok(v){ return (v/1e8); }
  function fmtEok(v){
    if(lang==="en"){
      if(Math.abs(v)>=1e9) return "$"+(v/1e9).toLocaleString("en-US",{minimumFractionDigits:1,maximumFractionDigits:1})+"B";
      if(Math.abs(v)>=1e6) return "$"+(v/1e6).toLocaleString("en-US",{maximumFractionDigits:0})+"M";
      return "$"+Math.round(v).toLocaleString("en-US");
    }
    var n = eok(v).toLocaleString(lang==="ko"?"ko-KR":"ja-JP",{minimumFractionDigits:1,maximumFractionDigits:1});
    return n + (lang==="ko"?"억 달러":"億ドル");
  }
  function fmtShares(v){ return v.toLocaleString("en-US"); }
  function fmtPct(p,withSign){
    if(p===null||p===undefined) return "—";
    var s=(p>0&&withSign!==false?"+":"")+p.toFixed(p!==0&&Math.abs(p)<10?1:0)+"%";
    return s;
  }
  function accLink(cik,acc){
    if(!acc) return "https://www.sec.gov/cgi-bin/browse-edgar?action=getcompany&CIK="+cik+"&type=13F-HR";
    var nd=acc.replace(/-/g,"");
    return "https://www.sec.gov/Archives/edgar/data/"+cik+"/"+nd+"/"+acc+"-index.htm";
  }
  function clTag(cl){ return cl && cl!=="COM" && cl!=="" ? '<span class="cl">'+cl+'</span>' : ""; }
  function el(id){ return document.getElementById(id); }

  // diverging color by pct change (East-Asia convention: red=up, blue=down)
  function deltaColor(status,pct){
    if(status==="NEW") return "#2A2418";           // dark gold-tinted; gold border added separately
    if(status==="HOLD"||pct===null||pct===undefined) return "#2A3947";
    var a=Math.min(Math.abs(pct),40)/40;           // 0..1
    function mix(c1,c2,f){
      var r=Math.round(c1[0]+(c2[0]-c1[0])*f), g=Math.round(c1[1]+(c2[1]-c1[1])*f), b=Math.round(c1[2]+(c2[2]-c1[2])*f);
      return "rgb("+r+","+g+","+b+")";
    }
    var neu=[42,57,71];
    if(pct>0) return mix(neu,[240,82,76],0.25+0.75*a);
    if(pct<0) return mix(neu,[62,123,234],0.25+0.75*a);
    return "rgb(42,57,71)";
  }

  // ---------- render ----------
  function renderStatic(){
    el("mgr-name").textContent = D.manager.label[lang];
    el("mgr-sub").textContent = t().sub;
    el("hl-lead").textContent = t().lead;
    el("k-form").textContent=t().form; el("k-period").textContent=t().period;
    el("k-filed").textContent=t().filed; el("k-cik").textContent=t().cik;
    el("sum-tag").textContent=t().sumTag;
    el("h-map").textContent=t().hMap; el("h-ledger").textContent=t().hLedger; el("h-table").textContent=t().hTable;
    el("lang-ko").setAttribute("aria-pressed", lang==="ko");
    el("lang-ja").setAttribute("aria-pressed", lang==="ja");
    el("lang-en").setAttribute("aria-pressed", lang==="en");
    document.documentElement.lang = lang;
    // legend
    el("legend").innerHTML =
      '<span><i style="background:'+deltaColor("ADD",30)+'"></i>'+t().legUp+'</span>'+
      '<span><i style="background:'+deltaColor("TRIM",-30)+'"></i>'+t().legDown+'</span>'+
      '<span><i style="background:#2A2418;box-shadow:inset 0 0 0 1px var(--stamp)"></i>'+t().legNew+'</span>';
    // table header
    var th=t().th;
    el("thead-row").innerHTML =
      '<th class="l">'+th.rank+'</th><th class="l">'+th.tkr+'</th><th class="l">'+th.co+'</th>'+
      '<th>'+th.weight+'</th><th>'+th.value+'</th><th>'+th.shares+'</th><th>'+th.chg+'</th><th>'+th.status+'</th>';
    // quarter selector
    var sel=el("qsel"); sel.innerHTML="";
    D.quarters.forEach(function(q,i){
      var o=document.createElement("option"); o.value=i; o.textContent=q.label[lang]+"  ("+q.form+")"; sel.appendChild(o);
    });
    sel.value=qi;
    // footer
    el("disclaimer").textContent=t().disc;
    el("gen-line").textContent=t().gen+" · "+ (D.generated||"").replace("T"," ").replace("+00:00"," UTC");
    // beyond-13F (static parts)
    el("h-beyond").textContent=t().hBeyond;
    el("beyond-note").textContent=t().beyondNote;
    renderJapan();
  }

  function renderQuarter(){
    var q=D.quarters[qi];
    var prev=D.quarters[qi+1]; // older
    // stamp
    el("v-form").textContent=q.form;
    el("v-period").textContent=q.period;
    el("v-filed").textContent=q.filed||"—";
    el("v-cik").textContent=D.manager.cik;
    el("v-acc").textContent=q.accession||"—";
    el("v-link").href=accLink(D.manager.cik,q.accession);

    // headline
    buildHeadline(q);

    // tiles
    var s=q.stats||{};
    var qoq=null;
    if(prev && prev.total_value){ qoq=(q.total_value-prev.total_value)/prev.total_value*100; }
    var tl=t().tiles;
    var tiles=[
      {label:tl.total, value:fmtEok(q.total_value),
       sub: qoq!==null ? (t().vsPrev+" "+fmtPct(qoq)) : t().base,
       cls: qoq!==null ? (qoq>=0?"up":"down") : ""},
      {label:tl.holdings, value:q.num_holdings, sub:"", cls:""},
      {label:tl.opened, value:(s.new||0), sub:"", cls:(s.new?"up":"")},
      {label:tl.exited, value:(s.exited||0), sub:"", cls:(s.exited?"down":"")}
    ];
    el("tiles").innerHTML = tiles.map(function(x){
      return '<div class="tile"><div class="t-label">'+x.label+'</div>'+
             '<div class="t-value">'+x.value+'</div>'+
             (x.sub?'<div class="t-sub '+x.cls+'">'+x.sub+'</div>':'<div class="t-sub">&nbsp;</div>')+'</div>';
    }).join("");

    // summary
    el("sum-text").textContent = q.summary ? q.summary[lang] : "";

    // treemap + ledger + table
    renderTreemap(q);
    renderLedger(q);
    renderTable(q);
    renderBalanceSheet(q);

    // source line depends on this quarter's provenance
    var boot = (q.source||"").indexOf("bootstrap")>=0;
    el("src-line").textContent = boot ? t().srcBoot : t().srcEdgar;

    el("qsel").value=qi;
  }

  function buildHeadline(q){
    var s=q.stats||{}, big;
    if(!prevExists()){
      big = '<b>'+q.num_holdings+'</b> '+t().baseHeadline;
    } else if(lang==="ko"){
      big = '<span class="u">'+(s.exited||0)+'</span> 종목 청산 · <b>'+(s.new||0)+'</b> 종목 신규 · '
          + '<span class="d">'+(s.trimmed||0)+'</span> 축소 · <span class="u">'+(s.added||0)+'</span> 확대';
    } else if(lang==="ja"){
      big = '<span class="u">'+(s.exited||0)+'</span> 全売却 · <b>'+(s.new||0)+'</b> 新規 · '
          + '<span class="d">'+(s.trimmed||0)+'</span> 減 · <span class="u">'+(s.added||0)+'</span> 増';
    } else {
      big = '<span class="u">'+(s.exited||0)+'</span> exited · <b>'+(s.new||0)+'</b> opened · '
          + '<span class="d">'+(s.trimmed||0)+'</span> trimmed · <span class="u">'+(s.added||0)+'</span> added';
    }
    el("hl-big").innerHTML = big;
  }
  function prevExists(){ return !!D.quarters[qi+1]; }

  function renderTreemap(q){
    var data=q.holdings.map(function(h){
      var isNew=h.status==="NEW";
      return {
        name:h.ticker, value:h.value,
        _pct:h.pct_chg, _status:h.status, _w:h.weight, _cl:h.cl,
        itemStyle:{
          color:deltaColor(h.status,h.pct_chg),
          borderColor:isNew?"#C8A96C":"#0D141C",
          borderWidth:isNew?2:1
        }
      };
    });
    var prevChart = echarts.getInstanceByDom ? echarts.getInstanceByDom(el("treemap")) : null;
    if(prevChart){ prevChart.dispose(); }
    var chart=echarts.init(el("treemap"),null,{renderer:"canvas"});
    chart.setOption({
      backgroundColor:"transparent",
      tooltip:{
        backgroundColor:"#0F1822", borderColor:"#1F2D3B", borderWidth:1,
        textStyle:{color:"#E9EEF3", fontFamily:"IBM Plex Mono"},
        formatter:function(p){
          var d=p.data;
          var chg = (d._status==="NEW") ? t().newTag
                   : (d._pct===null||d._pct===undefined) ? "—"
                   : fmtPct(d._pct);
          return '<b>'+d.name+'</b>'+(d._cl?' '+d._cl:'')+'<br/>'+
                 fmtEok(d.value)+'<br/>'+
                 t().weightLabel+d._w+'%<br/>'+
                 t().sharesChg+chg;
        }
      },
      series:[{
        type:"treemap", roam:false, nodeClick:false, breadcrumb:{show:false},
        width:"100%", height:"100%", top:6, left:6, right:6, bottom:6,
        itemStyle:{gapWidth:2, borderColor:"#0D141C"},
        label:{
          show:true, position:"insideTopLeft",
          formatter:function(p){
            var d=p.data;
            var tag = d._status==="NEW" ? " ●" : "";
            var pct = (d._status==="NEW")? t().newShort :
                      (d._pct===null||d._pct===undefined)?"" : fmtPct(d._pct);
            return "{tkr|"+d.name+tag+"}\n{pct|"+pct+"}";
          },
          rich:{
            tkr:{fontFamily:"IBM Plex Mono", fontSize:13, fontWeight:600, color:"#F2F5F8", lineHeight:18},
            pct:{fontFamily:"IBM Plex Mono", fontSize:11, color:"rgba(255,255,255,.82)"}
          }
        },
        upperLabel:{show:false},
        data:data
      }]
    });
    if(renderTreemap._ro) window.removeEventListener("resize",renderTreemap._ro);
    renderTreemap._ro=function(){ chart.resize(); };
    window.addEventListener("resize",renderTreemap._ro);
  }

  function renderLedger(q){
    var news=q.holdings.filter(function(h){return h.status==="NEW";}).sort(byVal);
    var adds=q.holdings.filter(function(h){return h.status==="ADD"&&h.pct_chg!=null;}).sort(byPctDesc);
    var trims=q.holdings.filter(function(h){return h.status==="TRIM"&&h.pct_chg!=null;}).sort(byPctAsc);
    var exits=(q.exits||[]).slice().sort(byVal);
    var maxAdd=Math.max.apply(null,adds.map(function(h){return Math.abs(h.pct_chg);}).concat([1]));
    var maxTrim=Math.max.apply(null,trims.map(function(h){return Math.abs(h.pct_chg);}).concat([1]));
    var maxNew=Math.max.apply(null,news.map(function(h){return h.value;}).concat([1]));
    var maxExit=Math.max.apply(null,exits.map(function(h){return h.value;}).concat([1]));

    function rowsNew(){
      if(!prevExists()) return '<div class="empty">'+t().base+'</div>';
      if(!news.length) return emptyRow();
      return news.map(function(h){
        return lrow(h.ticker,"new",(h.value/maxNew*100),"new",fmtEok(h.value));
      }).join("");
    }
    function rowsExit(){
      if(!prevExists()) return '<div class="empty">'+t().base+'</div>';
      if(!exits.length) return emptyRow();
      return exits.map(function(h){
        return lrow(h.ticker,"exit",(h.value/maxExit*100),"exit","−"+fmtEok(h.value));
      }).join("");
    }
    function rowsAdd(){
      if(!prevExists()) return '<div class="empty">'+t().base+'</div>';
      if(!adds.length) return emptyRow();
      return adds.map(function(h){
        return lrow(h.ticker,"up",(Math.abs(h.pct_chg)/maxAdd*100),"up",fmtPct(h.pct_chg));
      }).join("");
    }
    function rowsTrim(){
      if(!prevExists()) return '<div class="empty">'+t().base+'</div>';
      if(!trims.length) return emptyRow();
      return trims.map(function(h){
        return lrow(h.ticker,"down",(Math.abs(h.pct_chg)/maxTrim*100),"down",fmtPct(h.pct_chg));
      }).join("");
    }
    el("ledger").innerHTML =
      grp("g-new",t().grpNew,news.length,rowsNew())+
      grp("g-exit",t().grpExit,prevExists()?exits.length:"—",rowsExit())+
      grp("g-add",t().grpAdd,prevExists()?adds.length:"—",rowsAdd())+
      grp("g-trim",t().grpTrim,prevExists()?trims.length:"—",rowsTrim());
  }
  function grp(cls,title,count,body){
    return '<div class="lgroup"><h3 class="'+cls+'">'+title+' <span class="badge">'+count+'</span></h3>'+body+'</div>';
  }
  function lrow(tkr,barcls,pct,amtcls,amt){
    var w=Math.max(4,Math.min(100,pct));
    return '<div class="lrow"><span class="tkr">'+tkr+'</span>'+
           '<span class="bar-wrap"><span class="bar '+barcls+'" style="width:'+w+'%"></span></span>'+
           '<span class="amt '+amtcls+'">'+amt+'</span></div>';
  }
  function emptyRow(){ return '<div class="empty">'+t().none+'</div>'; }
  function byVal(a,b){return b.value-a.value;}
  function byPctDesc(a,b){return b.pct_chg-a.pct_chg;}
  function byPctAsc(a,b){return a.pct_chg-b.pct_chg;}

  function renderTable(q){
    var rows=q.holdings.map(function(h,i){
      var chg,cls;
      if(h.status==="NEW"){ chg=t().newTag; cls="up"; }
      else if(h.status==="HOLD"||h.pct_chg==null){ chg="—"; cls="flat"; }
      else { chg=fmtPct(h.pct_chg); cls=h.pct_chg>0?"up":(h.pct_chg<0?"down":"flat"); }
      var pill=t().statusMap?t().statusMap[h.status]:h.status;
      return '<tr>'+
        '<td class="l num">'+(i+1)+'</td>'+
        '<td class="l tkr-cell">'+h.ticker+clTag(h.cl)+'</td>'+
        '<td class="l co">'+h.name+'</td>'+
        '<td class="num">'+h.weight.toFixed(2)+'%</td>'+
        '<td class="num">'+fmtEok(h.value)+'</td>'+
        '<td class="num">'+fmtShares(h.shares)+'</td>'+
        '<td class="num chg '+cls+'">'+chg+'</td>'+
        '<td class="l"><span class="pill '+h.status+'">'+h.status+'</span></td>'+
      '</tr>';
    }).join("");
    el("tbody").innerHTML=rows;
  }

  function renderJapan(){
    var sp=D.supplemental, card=el("jp-card");
    if(!sp||!sp.japan){ if(card) card.style.display="none"; return; }
    var jp=sp.japan;
    var rows=jp.holdings.map(function(h){
      var nm = lang==="ko"?h.ko:(lang==="ja"?h.ja:h.en);
      return '<div class="jp-row"><span class="jp-code">'+h.code+'</span>'+
             '<span class="jp-name">'+nm+'</span>'+
             '<span class="jp-stake">'+h.stake+'</span></div>';
    }).join("");
    var gainPct=Math.round((jp.market_usd/jp.cost_usd-1)*100);
    card.innerHTML=
      '<div class="bc-head"><h3>'+t().jpTitle+'</h3><span class="bc-asof">'+t().jpAsOf+' '+jp.as_of+'</span></div>'+
      '<div class="jp-list">'+rows+'</div>'+
      '<div class="jp-agg">'+
        '<div><span class="ag-l">'+t().jpCost+'</span><span class="ag-v">'+fmtEok(jp.cost_usd)+'</span></div>'+
        '<div class="ag-arrow">→</div>'+
        '<div><span class="ag-l">'+t().jpMarket+'</span><span class="ag-v up">'+fmtEok(jp.market_usd)+'</span></div>'+
        '<div class="ag-gain up">+'+gainPct+'%</div>'+
      '</div>'+
      '<div class="bc-src">'+jp.source[lang]+'</div>'+
      '<div class="bc-note">'+t().jpNote+'</div>';
  }

  function renderBalanceSheet(q){
    var sp=D.supplemental, card=el("bs-card");
    if(!sp||!sp.balance_sheet){ if(card) card.style.display="none"; return; }
    var bp=sp.balance_sheet.by_period[q.period];
    if(!bp){ card.innerHTML='<div class="bc-head"><h3>'+t().bsTitle+'</h3></div><div class="empty">'+t().none+'</div>'; return; }
    var older=D.quarters[qi+1];
    var prevBp=older?sp.balance_sheet.by_period[older.period]:null;
    var totDelta=(prevBp&&prevBp.cash_tbills)?((bp.cash_tbills-prevBp.cash_tbills)/prevBp.cash_tbills*100):null;
    var ratio=bp.cash_tbills/q.total_value;
    card.innerHTML=
      '<div class="bc-head"><h3>'+t().bsTitle+'</h3><span class="bc-asof">'+q.period+'</span></div>'+
      '<div class="bs-tiles">'+
        bsTile(t().bsTotal, fmtEok(bp.cash_tbills), totDelta)+
        bsTile(t().bsTbills, fmtEok(bp.tbills), null)+
        bsTile(t().bsCash, fmtEok(bp.cash), null)+
        bsTile(t().bsBonds, fmtEok(bp.bonds), null)+
      '</div>'+
      '<div class="bs-insight">'+bsInsight(q,ratio)+'</div>'+
      '<div class="bc-src">'+sp.balance_sheet.source[lang]+'</div>';
  }
  function bsTile(label,val,delta){
    var sub = (delta!=null) ? '<div class="bt-sub '+(delta>=0?"up":"down")+'">'+t().vsPrev+' '+fmtPct(delta)+'</div>'
                            : '<div class="bt-sub">&nbsp;</div>';
    return '<div class="bs-tile"><div class="bt-l">'+label+'</div><div class="bt-v">'+val+'</div>'+sub+'</div>';
  }
  function bsInsight(q,ratio){
    var r=ratio.toFixed(1);
    if(lang==="ko") return '현금+미국채가 13F 주식 포트폴리오('+fmtEok(q.total_value)+')의 <b>'+r+'배</b>.';
    if(lang==="ja") return '現金＋米国債は13F株式ポートフォリオ('+fmtEok(q.total_value)+')の<b>'+r+'倍</b>。';
    return 'Cash + T-bills is <b>'+r+'×</b> the disclosed 13F equity book ('+fmtEok(q.total_value)+').';
  }

  // ---------- events ----------
  el("lang-ko").addEventListener("click",function(){ if(lang!=="ko"){lang="ko"; renderStatic(); renderQuarter();} });
  el("lang-ja").addEventListener("click",function(){ if(lang!=="ja"){lang="ja"; renderStatic(); renderQuarter();} });
  el("lang-en").addEventListener("click",function(){ if(lang!=="en"){lang="en"; renderStatic(); renderQuarter();} });
  el("qsel").addEventListener("change",function(e){ qi=parseInt(e.target.value,10)||0; renderQuarter(); });

  // ---------- boot ----------
  if(!D||!D.quarters||!D.quarters.length){
    document.querySelector(".wrap").innerHTML='<p style="font-family:var(--mono);color:var(--muted)">No data. Run the pipeline to generate data/data.js.</p>';
    return;
  }
  renderStatic();
  renderQuarter();
})();
</script>
</body>
</html>
